<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تم تأكيد البريد - AmrNayl Academy</title>
    <link rel="stylesheet" href="css/style.css?v=3" />
    <link rel="shortcut icon" href="fav.ico" type="image/x-icon" />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        .verify-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--spacing-md);
            background: var(--bg-light);
        }
        .verify-box {
            max-width: 420px;
            width: 100%;
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
            text-align: center;
        }
        .verify-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto var(--spacing-md);
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .verify-icon i {
            font-size: 2.25rem;
            color: var(--text-light);
        }
        .verify-box h1 {
            color: var(--primary-dark);
            font-size: clamp(1.1rem, 2.5vw, 1.35rem);
            margin-bottom: var(--spacing-sm);
        }
        .verify-box p {
            color: var(--text-dark);
            line-height: 1.7;
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
        }
        .verify-box .btn {
            display: inline-block;
            background: var(--primary-blue);
            color: var(--text-light) !important;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            transition: background 0.2s ease;
        }
        .verify-box .btn:hover {
            background: #3a7bc8;
        }
        @media (max-width: 480px) {
            .verify-box { padding: var(--spacing-md); }
        }
    </style>
</head>
<body>
    <div class="verify-page">
        <div class="verify-box">
            <div class="verify-icon">
                <i class="bi bi-check-lg"></i>
            </div>
            <h1>تم تأكيد بريدك الإلكتروني</h1>
            <p>تم تأكيد بريدك الإلكتروني بنجاح. يمكنك الآن تسجيل الدخول واستخدام المنصة.</p>
            <a href="index.html" class="btn">تسجيل الدخول</a>
        </div>
    </div>
</body>
</html>
